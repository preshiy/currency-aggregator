<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Aggregator</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f72585, #7209b7, #4cc9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #4cc9f0;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input, select {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      outline: none;
    }

    input::placeholder { color: #718096; }

    select option { background: #1a1a2e; color: #fff; }

    button {
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(90deg, #f72585, #7209b7);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }

    .btn-secondary {
      background: linear-gradient(90deg, #4361ee, #4cc9f0);
      color: #fff;
    }

    .btn-secondary:hover { opacity: 0.85; transform: translateY(-2px); }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(76,201,240,0.3);
      display: none;
    }

    .result-box.show { display: block; }

    .result-amount {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f72585, #4cc9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .result-label { color: #a0aec0; font-size: 0.85rem; margin-top: 4px; }

    .rates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .rate-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      transition: all 0.2s;
    }

    .rate-item:hover {
      border-color: #f72585;
      transform: translateY(-2px);
    }

    .rate-code { font-weight: 700; font-size: 0.95rem; color: #4cc9f0; }
    .rate-value { font-size: 0.85rem; color: #e2e8f0; margin-top: 4px; }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 20px;
      display: none;
    }

    .loading.show { display: block; }

    .error {
      color: #f72585;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    .error.show { display: block; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4cc9f0; border-radius: 10px; }
  </style>
</head>
<body>

  <header>
    <h1>💱 Currency Aggregator</h1>
    <p>Live exchange rates & currency converter powered by real-time data</p>
  </header>

  <div class="container">

    <!-- Converter Card -->
    <div class="card">
      <h2>⚡ Currency Converter</h2>
      <div class="input-row">
        <input type="number" id="amount" placeholder="Amount (e.g. 100)" value="100"/>
        <input type="text" id="fromCurrency" placeholder="From (e.g. USD)" value="USD" maxlength="3"/>
        <input type="text" id="toCurrency" placeholder="To (e.g. NGN)" value="NGN" maxlength="3"/>
        <button class="btn-primary" onclick="convertCurrency()">Convert</button>
      </div>
      <div class="error" id="convertError">Something went wrong. Check your currency codes.</div>
      <div class="result-box" id="convertResult">
        <div class="result-amount" id="convertAmount"></div>
        <div class="result-label" id="convertLabel"></div>
      </div>
    </div>

    <!-- Rates Card -->
    <div class="card">
      <h2>🌍 Live Exchange Rates</h2>
      <div class="input-row">
        <input type="text" id="baseCurrency" placeholder="Base currency (e.g. USD)" value="USD" maxlength="3"/>
        <button class="btn-secondary" onclick="fetchRates()">Fetch Rates</button>
      </div>
      <div class="error" id="ratesError">Something went wrong. Check your currency code.</div>
      <div class="loading" id="ratesLoading">⏳ Fetching live rates...</div>
      <div class="rates-grid" id="ratesGrid"></div>
    </div>

  </div>

  <script>
    async function convertCurrency() {
      const amount = document.getElementById('amount').value;
      const from = document.getElementById('fromCurrency').value.toUpperCase();
      const to = document.getElementById('toCurrency').value.toUpperCase();
      const resultBox = document.getElementById('convertResult');
      const errorBox = document.getElementById('convertError');

      resultBox.classList.remove('show');
      errorBox.classList.remove('show');

      try {
        const res = await fetch(`/rates/convert?from=${from}&to=${to}&amount=${amount}`);
        const data = await res.json();

        if (!data.success) throw new Error();

        document.getElementById('convertAmount').textContent =
          `${Number(data.result).toLocaleString()} ${to}`;
        document.getElementById('convertLabel').textContent =
          `${amount} ${from} = ${Number(data.result).toLocaleString()} ${to}`;

        resultBox.classList.add('show');
      } catch {
        errorBox.classList.add('show');
      }
    }

    async function fetchRates() {
      const base = document.getElementById('baseCurrency').value.toUpperCase();
      const grid = document.getElementById('ratesGrid');
      const loading = document.getElementById('ratesLoading');
      const errorBox = document.getElementById('ratesError');

      grid.innerHTML = '';
      errorBox.classList.remove('show');
      loading.classList.add('show');

      try {
        const res = await fetch(`/rates?base=${base}`);
        const data = await res.json();

        if (!data.success) throw new Error();

        loading.classList.remove('show');

        Object.entries(data.rates).forEach(([code, rate]) => {
          const item = document.createElement('div');
          item.className = 'rate-item';
          item.innerHTML = `
            <div class="rate-code">${code}</div>
            <div class="rate-value">${Number(rate).toFixed(4)}</div>
          `;
          grid.appendChild(item);
        });
      } catch {
        loading.classList.remove('show');
        errorBox.classList.add('show');
      }
    }

    // Auto load rates on page open
    fetchRates();
  </script>

</body>
</html>
